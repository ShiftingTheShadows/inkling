.modal-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 20px; line-height: 1; font-family: var(--font); transition: color 0.1s; }
.modal-close:hover { color: var(--danger); }
.modal-body { flex: 1; padding: 20px; overflow-y: auto; }
.modal-footer { padding: 13px 20px; border-top: 1px solid var(--border2); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border2); flex-shrink: 0; }
.modal-tab { padding: 9px 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; background: transparent; color: var(--text3); border-bottom: 2px solid transparent; font-family: var(--font); transition: all 0.1s; }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface2); }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: var(--text3); margin-bottom: 5px; }
.form-input { width: 100%; padding: 7px 10px; }
.form-textarea { width: 100%; padding: 7px 10px; resize: vertical; min-height: 70px; line-height: 1.55; }
.form-select { width: 100%; padding: 7px 10px; cursor: pointer; }
.form-range { width: 100%; accent-color: var(--accent); margin: 5px 0; }
.form-hint { font-size: 10px; color: var(--text3); margin-top: 4px; line-height: 1.5; }
.settings-section-title { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--accent); padding-bottom: 8px; border-bottom: 1px solid var(--border2); margin-bottom: 12px; }
.history-session { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border2); margin-bottom: 6px; }
.history-session:hover { border-color: var(--border3); }
.history-session-info { flex: 1; min-width: 0; }
.history-session-title { font-size: 12px; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-session-meta { font-size: 10px; color: var(--text3); }
.cmd-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: flex; align-items: flex-start; justify-content: center; padding-top: 13vh; z-index: 2000; }
.cmd-palette { background: var(--surface); border: 1px solid var(--border3); width: 100%; max-width: 540px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }
.cmd-input { width: 100%; padding: 14px 16px; background: transparent; border: none; border-bottom: 1px solid var(--border2); color: var(--text); font-size: 14px; font-family: var(--font); }
.cmd-input:focus { outline: none; box-shadow: none; }
.cmd-results { max-height: 340px; overflow-y: auto; }
.cmd-result { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.08s; }
.cmd-result:hover,.cmd-result.sel { background: var(--surface2); }
.cmd-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); font-size: 11px; font-weight: 700; flex-shrink: 0; font-family: var(--font); }
.cmd-label { font-size: 12px; color: var(--text); }
.cmd-sub { font-size: 10px; color: var(--text3); }
.cmd-footer { padding: 6px 16px; border-top: 1px solid var(--border); display: flex; gap: 16px; font-size: 10px; color: var(--text3); }
.toast-stack { position: fixed; bottom: 30px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 3000; pointer-events: none; }
.toast { padding: 9px 14px; background: var(--surface2); border: 1px solid var(--border2); font-size: 11px; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 300px; animation: toast-in 0.18s ease; pointer-events: auto; }
.toast.success { border-left: 2px solid var(--accent); }
.toast.error { border-left: 2px solid var(--danger); }
.toast.warning { border-left: 2px solid var(--warning); }
.toast.info { border-left: 2px solid var(--info); }
@keyframes toast-in { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.import-drop { transition: background 0.15s, border-color 0.15s; }

/* ════════════════════════════════════════════════
   MOBILE / PHONE SUPPORT
   ════════════════════════════════════════════════ */
@media (max-width: 720px) {
  /* Use the real visible viewport height (handles mobile URL bars) */
  .app { height: 100vh; height: 100dvh; grid-template-rows: 52px 1fr 22px; }

  /* Sidebar becomes an off-canvas drawer */
  .sidebar {
    position: fixed !important;
    top: 52px; bottom: 22px; left: 0;
    width: 84vw !important; max-width: 340px;
    z-index: 200;
    box-shadow: 8px 0 40px rgba(0,0,0,0.6);
    animation: drawer-in 0.2s ease;
  }
  @keyframes drawer-in { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  .sidebar-backdrop {
    position: fixed; inset: 52px 0 22px 0; z-index: 150;
    background: rgba(0,0,0,0.55);
    animation: fade-in 0.2s ease;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* Topbar: tighten, let the search shrink to an icon-ish pill */
  .topbar { padding: 0 8px; gap: 6px; }
  .cmd-trigger { max-width: none; padding: 6px 10px; }
  .cmd-trigger span:not(.cmd-kbd) { font-size: 0; }
  .cmd-trigger span:not(.cmd-kbd)::before { content: 'Search'; font-size: 11px; }
  .cmd-kbd { display: none; }
  .topbar-right { gap: 0; }
  .topbar-right .btn-icon { width: 34px !important; height: 34px !important; }
  .logo-text { display: none; }

  /* Bigger touch targets everywhere */
  .btn-icon { min-width: 34px; min-height: 34px; }

  /* Chat surfaces: edge-to-edge, comfortable padding */
  .messages-container { padding: 12px 12px 8px; }
  .chat-header { height: 50px; padding: 0 10px; }
  .chat-header-right { gap: 0; }
  .hdr-sep { display: none; }
  .input-statusbar { padding: 5px 10px; }
  .input-meta { gap: 6px; }

  /* Message action buttons are always visible on touch (no hover) */
  .msg-actions { opacity: 1 !important; }
  .msg-action-btn { width: 30px; height: 28px; }
  .msg { gap: 10px; }

  /* Embeds fit the narrow column */
  .embed-img, .msg-image { max-width: 100%; }
  .embed-yt, .embed-video, .embed-audio { max-width: 100%; }

  /* Modals & palette go full-bleed */
  .modal-overlay { padding: 0; align-items: stretch; }
  .modal, .modal-lg { max-width: 100% !important; width: 100%; max-height: 100%; height: 100%; border: none; }
  .modal-body { -webkit-overflow-scrolling: touch; }
  .cmd-overlay { padding-top: 0; }
  .cmd-palette { max-width: 100%; height: 100%; display: flex; flex-direction: column; }
  .cmd-palette .cmd-results { max-height: none; flex: 1; }

  /* Two-column form grids collapse to one */
  .form-2col { grid-template-columns: 1fr !important; gap: 14px !important; }

  /* Welcome screen breathing room */
  .welcome-inner { padding: 24px 16px; }
  .welcome-title { font-size: 20px; }

  /* Status bar: hide the keyboard-hint tail on phones */
  .statusbar-right { display: none; }

  /* Prevent iOS auto-zoom on input focus (needs >=16px) */
  .form-input, .form-textarea, .cmd-input, .msg-input, .msg-edit-textarea, textarea, input[type="text"], input[type="password"], input[type="number"] { font-size: 16px !important; }
}

@media (max-width: 400px) {
  .topbar-right .btn-icon:nth-child(3) { display: none; } /* export — least used on phone */
}
